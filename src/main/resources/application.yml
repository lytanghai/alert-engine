spring:
  application:
    name: alert-engine

  profile:
    active: local

  datasource:
    url: ${datasource.url}
    username: ${datasource.username}
    password: ${datasource.password}

  jpa:
    hibernate:
      ddl-auto: update   # auto create/update tables
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

telegram:
  bot:
    token: ${telegram.bot.token}
    username: ${telegram.bot.username}
